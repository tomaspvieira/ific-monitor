name: IFIC IA nas PME — Daily Monitor

on:
  schedule:
    # Runs every day at 08:00 UTC (09:00 Lisbon time in winter, 10:00 in summer)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allows you to trigger manually from the GitHub Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state file back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore previous state
        # The state file is committed back to the repo after each run
        # so we always have the previous hash to compare against
        run: |
          mkdir -p data
          echo "State file present: $(ls data/ 2>/dev/null || echo 'none yet')"

      - name: Run monitor
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python monitor.py

      - name: Commit updated state
        if: always()  # commit state even if the script exits with code 1 (alert)
        run: |
          git config user.name "IFIC Monitor Bot"
          git config user.email "actions@github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: update monitor state $(date -u +'%Y-%m-%d')"
          git push
